# FinaTrack Application Properties
spring.application.name=FinaTrack
server.port=8080

# H2 Database (in-memory for development)
spring.datasource.url=jdbc:h2:mem:finatrackdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:FinaTrackSecretKeyForJwtToken2024MustBeAtLeast256BitsLongForSecurity}
jwt.expiration-ms=86400000

# Spring Profiles
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
